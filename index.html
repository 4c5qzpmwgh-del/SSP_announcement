<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告生成</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-checkbox { display: none; }
        .cat-label { 
            display: inline-block; padding: 6px 14px; border: 1px solid #e2e8f0; 
            border-radius: 99px; font-size: 13px; cursor: pointer; transition: all 0.2s;
            background: #f8fafc; color: #64748b;
        }
        .cat-checkbox:checked + .cat-label { 
            background: #4f46e5; border-color: #4f46e5; color: white; 
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .cat-ssp:checked + .cat-label { background: #0891b2; border-color: #0891b2; }
        input:disabled { background: #f1f5f9; cursor: not-allowed; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
            <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg mr-2 text-sm">SSP</span> 
            公告生成
        </h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-7 space-y-4">
                <div class="card p-6 border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-3">1. 選擇類別 (可多選)</label>
                    <div class="flex flex-wrap gap-2 mb-6" id="catGroup">
                        <input type="checkbox" id="c1" class="cat-checkbox" value="捕鱼游戏"><label for="c1" class="cat-label">捕鱼游戏</label>
                        <input type="checkbox" id="c2" class="cat-checkbox" value="棋牌对战"><label for="c2" class="cat-label">棋牌对战</label>
                        <input type="checkbox" id="c3" class="cat-checkbox" value="棋牌百人"><label for="c3" class="cat-label">棋牌百人</label>
                        <input type="checkbox" id="c4" class="cat-checkbox" value="街机游戏"><label for="c4" class="cat-label">街机游戏</label>
                        <input type="checkbox" id="c5" class="cat-checkbox" value="老虎机"><label for="c5" class="cat-label">老虎机</label>
                        <input type="checkbox" id="c6" class="cat-checkbox" value="真人对战"><label for="c6" class="cat-label">真人对战</label>
                        <input type="checkbox" id="c7" class="cat-checkbox" value="电子彩票"><label for="c7" class="cat-label">电子彩票</label>
                        <input type="checkbox" id="c8" class="cat-checkbox" value="刮刮乐"><label for="c8" class="cat-label">刮刮乐</label>
                        <input type="checkbox" id="c9" class="cat-checkbox" value="特色游戏"><label for="c9" class="cat-label">特色游戏</label>
                        <input type="checkbox" id="c11" class="cat-checkbox" value="SSP棋牌(所有棋牌不分類)"><label for="c11" class="cat-label">SSP棋牌</label>
                        <input type="checkbox" id="c12" class="cat-checkbox" value="SSP電子(所有電子不分類)"><label for="c12" class="cat-label">SSP電子</label>
                        <input type="checkbox" id="c13" class="cat-checkbox" value="SSP捕魚(所有捕魚不分類)"><label for="c13" class="cat-label">SSP捕魚</label>
                        <input type="checkbox" id="c14" class="cat-checkbox" value="SSP平台(全平台)"><label for="c14" class="cat-label">SSP平台(全平台)</label>
                        <div class="w-full my-1"></div>
                        <input type="checkbox" id="c15" class="cat-checkbox" value="新游戏上线(DSG)"><label for="c15" class="cat-label border-orange-200 text-orange-600">新游戏上线(DSG)</label>
                        <input type="checkbox" id="c16" class="cat-checkbox cat-ssp" value="新游戏上线(SSP)"><label for="c16" class="cat-label border-cyan-200 text-cyan-600">🚀 新游戏上线(SSP)</label>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">平台名称</label>
                            <input type="text" id="platform" class="w-full border rounded p-2 text-sm outline-none focus:border-indigo-500" value="SSP平台">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">公告類型</label>
                            <select id="noticeType" class="w-full border rounded p-2 text-sm outline-none bg-white">
                                <option value="例行维护通知">例行维护通知</option>
                                <option value="临时维护通知">临时维护通知</option>
                                <option value="新游戏上线通知">新游戏上线通知</option>
                                <option value="新游戏上架通知">新游戏上架通知</option>
                            </select>
                        </div>
                    </div>

                    <div id="sspInfoSection" class="hidden p-4 bg-cyan-50 border border-cyan-100 rounded-lg mb-4 space-y-3">
                        <p class="text-xs font-bold text-cyan-700">【SSP 游戏资讯手动填写】</p>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <div>
                                <label class="block text-[10px] text-cyan-600 font-bold">名称(简中)</label>
                                <input type="text" id="nameCN" class="w-full border rounded p-2 text-sm" placeholder="XXXX">
                            </div>
                            <div>
                                <label class="block text-[10px] text-cyan-600 font-bold">名称(英)</label>
                                <input type="text" id="nameEN" class="w-full border rounded p-2 text-sm" placeholder="XXXX">
                            </div>
                            <div>
                                <label class="block text-[10px] text-cyan-600 font-bold">GameID</label>
                                <input type="text" id="gameID" class="w-full border rounded p-2 text-sm" placeholder="XXXX">
                            </div>
                        </div>
                    </div>

                    <div id="standardGameListArea" class="mb-4">
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">维护/上线游戏清单 (可手动修改)</label>
                        <textarea id="gameList" rows="3" class="w-full border rounded p-2 text-sm outline-none focus:border-indigo-500" placeholder="请输入游戏名称..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">开始/上线时间</label>
                            <div class="flex gap-1">
                                <input type="datetime-local" id="startTimePicker" class="flex-1 border rounded p-2 text-xs">
                                <button onclick="setStartNow()" class="bg-slate-200 text-xs px-2 rounded hover:bg-slate-300 text-slate-600">即刻</button>
                            </div>
                            <div class="mt-1 flex items-center"><input type="checkbox" id="startImmediate" class="mr-1" checked> <span class="text-xs text-slate-500">鎖定為「即刻」</span></div>
                        </div>
                        <div id="endTimeArea">
                            <label class="block text-xs font-bold text-slate-500 mb-1 uppercase">完成时间</label>
                            <div class="flex gap-1">
                                <input type="datetime-local" id="endTimePicker" class="flex-1 border rounded p-2 text-xs">
                                <button onclick="setEndPending()" class="bg-slate-200 text-xs px-2 rounded hover:bg-slate-300 text-slate-600">待定</button>
                            </div>
                            <div class="mt-1 flex items-center"><input type="checkbox" id="endPending" class="mr-1"> <span class="text-xs text-slate-500">鎖定為「待定」</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="card p-6 border border-indigo-200 bg-white sticky top-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-indigo-600 px-2 py-1 bg-indigo-50 rounded">PREVIEW</span>
                        <button onclick="copyText()" id="copyBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg shadow-lg transition active:scale-95 font-bold">
                            複製全文
                        </button>
                    </div>
                    <div id="output" class="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm font-mono border-t pt-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const el = id => document.getElementById(id);

        const gameData = {
            "捕鱼游戏": "捕鱼大咖、渔乐天下、丛林派对、捕鱼财神",
            "棋牌对战": "二人麻将、单挑牛牛、21点、抢庄牌九、看三张抢庄牛牛、看四张抢庄牛牛、癞子牛牛、三公、对战二八杠、抢庄牛牛、通比牛牛",
            "棋牌百人": "飞禽走兽、龙虎斗、奔驰宝马、红黑大战、森林舞会、百家乐、百人牛牛、百人骰宝、万人炸金花、万人推筒子",
            "街机游戏": "经典水果机、美女水果机、澳6水果机、水果机",
            "老虎机": "SSP电子",
            "真人对战": "掼蛋",
            "电子彩票": "极速澳门六合彩",
            "刮刮乐": "五福临门、好运十倍、快乐8",
            "特色游戏": "修仙渡劫、一飞冲天",
            "SSP平台(全平台)": "SSP平台"
        };

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const M = String(d.getMonth() + 1).padStart(2, '0');
            const D = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${M}月${D}日 ${hh}:${mm} (GMT+8)`;
        }

        function generate() {
            const platform = el('platform').value;
            const games = el('gameList').value;
            const type = el('noticeType').value;
            
            const selectedCats = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(c => c.value);
            const isFullPlatform = selectedCats.includes('SSP平台(全平台)');
            const isNewGameStandard = selectedCats.includes('新游戏上线');
            const isNewGameSSP = selectedCats.includes('新游戏上线(SSP)');

            let startText = el('startImmediate').checked ? '即刻' : formatDate(el('startTimePicker').value);
            let endText = el('endPending').checked ? '待定' : formatDate(el('endTimePicker').value);

            let template = '';

            if (isNewGameSSP) {
                // --- 1. 新游戏上线(SSP) 模板 ---
                el('sspInfoSection').classList.remove('hidden');
                el('endTimeArea').style.opacity = '0.3';
                el('standardGameListArea').style.display = 'none';

                const cn = el('nameCN').value || 'XXXX';
                const en = el('nameEN').value || 'XXXX';
                const gid = el('gameID').value || 'XXXX';

                template = `尊敬的客户您好，兹通知您【${platform}】新游戏上架通知

【游戏资讯】
名稱(簡中) : ${cn}
名稱(英) : ${en}
gameid : ${gid}
图档：如附件

请贵司务必更新，若未更新，将无法进行娱乐，同时请将旧版入口请关闭更换为新版入口。
若有任何问题欢迎随时与我们联系，谢谢您！`;

            } else if (isNewGameStandard) {
                // --- 2. 原版 新游戏上线 模板 ---
                el('sspInfoSection').classList.add('hidden');
                el('standardGameListArea').style.display = 'block';
                el('endTimeArea').style.opacity = '0.3';

                const formattedGames = games.split(/[，、, \n\t]+/).filter(s => s).map(s => `《${s}》`).join('');
                template = `尊敬的客户您好，兹通知您【${platform}】新游戏上线 通知

平台：【${platform}】
上线时间：${startText}
新增游戏：${formattedGames}

以上游戏已默认为「开启」，若贵司需要调整设置，可至后台於「游戏管理」→「游戏设置」修改

若有任何问题欢迎随时与我们联系，谢谢您`;

            } else {
                // --- 3. 维护类模板 ---
                el('sspInfoSection').classList.add('hidden');
                el('standardGameListArea').style.display = 'block';
                el('endTimeArea').style.opacity = '1';

                const formattedGames = games.split(/[，、, \n\t]+/).filter(s => s).map(s => `【${s}】`).join('');
                
                if (isFullPlatform) {
                    template = `尊敬的客户您好，兹通知您 【${platform}】 ${type}
维护平台： 【${platform}】
开始时间：${startText}
完成时间：${endText}
 
温馨提醒: 
◎维护期间内，维护产品将无法使用。
◎维护时间有任何异动，将会另行通知。
 
若有任何问题欢迎随时与我们联系，谢谢您！`;
                } else {
                    template = `尊敬的客户您好，兹通知您 【${platform}】 【单一游戏】${type}
维护平台： 【${platform}】
维护游戏： ${formattedGames}
开始时间：${startText}
完成时间：${endText}
 
温馨提醒: 
◎维护期间内，维护产品将无法使用。
◎维护时间有任何异动，将会另行通知。
 
若有任何问题欢迎随时与我们联系，谢谢您！`;
                }
            }

            el('output').innerText = template;
        }

        // 监听复选框
        document.querySelectorAll('.cat-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                const val = cb.value;
                if (cb.checked) {
                    if (val === '新游戏上线(SSP)') {
                        el('noticeType').value = '新游戏上架通知';
                        // 取消掉其他的通知勾选，避免干扰
                        el('c15').checked = false;
                        el('c14').checked = false;
                    } else if (val === '新游戏上线') {
                        el('noticeType').value = '新游戏上线通知';
                        el('c16').checked = false;
                    }
                }

                const selected = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(c => c.value);
                let combined = [];
                selected.forEach(cat => {
                    if (gameData[cat]) combined = [...combined, ...gameData[cat].split(/[，、, ]+/)];
                });
                if (combined.length > 0) el('gameList').value = [...new Set(combined)].join('、');
                
                generate();
            });
        });

        function setStartNow() { el('startImmediate').checked = true; el('startTimePicker').disabled = true; generate(); }
        function setEndPending() { el('endPending').checked = true; el('endTimePicker').disabled = true; generate(); }

        // 监听所有输入
        ['platform', 'gameList', 'startTimePicker', 'endTimePicker', 'noticeType', 'nameCN', 'nameEN', 'gameID'].forEach(id => {
            const dom = el(id);
            if(dom) dom.addEventListener('input', generate);
        });

        el('startImmediate').addEventListener('change', e => { el('startTimePicker').disabled = e.target.checked; generate(); });
        el('endPending').addEventListener('change', e => { el('endTimePicker').disabled = e.target.checked; generate(); });

        function copyText() {
            const text = el('output').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = el('copyBtn');
                btn.innerText = '已成功複製';
                btn.classList.replace('bg-indigo-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerText = '複製全文';
                    btn.classList.replace('bg-green-600', 'bg-indigo-600');
                }, 1500);
            });
        }

        const now = new Date();
        el('endTimePicker').value = new Date(now.getTime() + 7200000).toISOString().slice(0, 16);
        el('startTimePicker').disabled = true;
        generate();
    </script>
</body>
</html>
